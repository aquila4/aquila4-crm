<!DOCTYPE html>
<html>
<head>
    <title>Edit Marketer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<form method="POST" class="bg-white p-6 rounded shadow w-96 space-y-4">

    <h2 class="text-xl font-bold">Edit Marketer</h2>

    <input name="name" value="{{ marketer.name }}"
           class="w-full p-3 border rounded" required>

    <input name="phone" value="{{ marketer.phone }}"
           class="w-full p-3 border rounded">

    <input name="email" value="{{ marketer.email }}"
           class="w-full p-3 border rounded">

    <div class="flex justify-between">

        <a href="{{ url_for('marketers') }}"
           class="bg-gray-300 px-4 py-2 rounded">
           Cancel
        </a>

        <button class="bg-blue-500 text-white px-4 py-2 rounded">
            Update
        </button>

    </div>

</form>

</body>
</html>
