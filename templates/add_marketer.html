<!DOCTYPE html>
<html>
<head>
    <title>Add Marketer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<form method="POST" class="bg-white p-6 rounded shadow w-96 space-y-4">

    <h2 class="text-xl font-bold">Add Marketer</h2>

    <input name="name" placeholder="Full Name"
           class="w-full p-3 border rounded" required>

    <input name="phone" placeholder="Phone"
           class="w-full p-3 border rounded">

    <input name="email" placeholder="Email"
           class="w-full p-3 border rounded">

    <button class="w-full bg-green-500 text-white p-3 rounded">
        Save
    </button>

</form>

</body>
</html>
