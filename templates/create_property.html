<form method="POST" action="/property/new">
    <input type="text" name="name" placeholder="Property Name" required>
    <input type="text" name="location" placeholder="Location">

    <input type="number" name="rows" placeholder="Rows" required>
    <input type="number" name="columns" placeholder="Columns" required>

    <button type="submit">Create Property</button>
</form>
