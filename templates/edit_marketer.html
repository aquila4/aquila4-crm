<!DOCTYPE html>
<html>
<head>
    <title>Edit Marketer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

    <!-- Header -->
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
        Edit Marketer
    </h2>

    <form method="POST" class="space-y-4">

        <!-- Name -->
        <div>
            <label class="text-sm text-gray-600">Full Name</label>
            <input type="text" name="name" value="{{ marketer.name }}" required
                class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Phone -->
        <div>
            <label class="text-sm text-gray-600">Phone</label>
            <input type="text" name="phone" value="{{ marketer.phone }}"
                class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Email -->
        <div>
            <label class="text-sm text-gray-600">Email</label>
            <input type="email" name="email" value="{{ marketer.email }}"
                class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Buttons -->
        <div class="flex justify-between mt-6">

            <a href="{{ url_for('marketer_profile', id=marketer.id) }}"
               class="bg-gray-300 px-5 py-2 rounded-lg hover:bg-gray-400">
               Cancel
            </a>

            <button type="submit"
                class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                Update
            </button>

        </div>

    </form>

</div>

</body>
</html>
