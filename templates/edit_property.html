<!DOCTYPE html>
<html>
<head>
    <title>Edit Property</title>
</head>
<body style="font-family: Arial; padding:20px;">

<h2>Edit Property</h2>

<form method="POST">
    <input type="text" name="name" value="{{ property.name }}" placeholder="Name" required><br><br>

    <input type="text" name="location" value="{{ property.location }}" placeholder="Location" required><br><br>

    <button type="submit">Update</button>
</form>

</body>
</html>
